<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f0fdf4; color: #1a1a1a; font-size: 14px; }
button { cursor: pointer; font-family: inherit; border: none; }
select { font-family: inherit; }

/* ヘッダー */
#header { background: linear-gradient(135deg, #14532d, #16a34a); color: white; padding: 18px 14px 14px; }
#header h1 { font-size: 18px; font-weight: 700; }
#header p  { font-size: 10px; opacity: .8; }
#conn-dot  { width: 7px; height: 7px; border-radius: 50%; background: #f87171; display: inline-block; margin-right: 4px; }
#conn-dot.on { background: #86efac; }

/* ユーザーボタン */
.user-btn { flex: 1; padding: 9px 6px; border-radius: 11px; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px; }
.user-btn.active { border: 2.5px solid white; background: rgba(255,255,255,0.25); }
.badge { font-size: 9px; background: white; color: #16a34a; border-radius: 5px; padding: 1px 5px; }

/* タブ */
#tabs { display: flex; background: white; border-bottom: 1px solid #e5e7eb; }
.tab-btn { flex: 1; padding: 11px 0; border: none; background: none; font-size: 12px; font-weight: 600; color: #9ca3af; border-bottom: 2.5px solid transparent; }
.tab-btn.active { color: #16a34a; border-bottom-color: #16a34a; }

/* ナビ行 */
.nav-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: white; border-bottom: 1px solid #e5e7eb; }
.nav-btn { background: #f3f4f6; border: none; border-radius: 8px; width: 34px; height: 34px; font-size: 18px; color: #374151; }

/* 月グリッド */
#month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e5e7eb; }
.day-cell { background: white; min-height: 62px; padding: 3px; cursor: pointer; }
.day-cell.other { opacity: .3; }
.day-cell.today { background: #f0fdf4; }
.day-cell.selected { background: #dcfce7; }
.day-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; font-size: 11px; }
.day-num.today { background: #16a34a; color: white; font-weight: 700; }
.res-badge { border-radius: 2px; font-size: 8px; font-weight: 600; padding: 1px 3px; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 1px; }

/* 詳細パネル */
#detail-panel { margin: 8px 8px 0; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
#detail-panel.open { display: block; }
.detail-head { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; background: #dcfce7; border-bottom: 1px solid #16a34a44; }

/* 週カード */
.week-card { margin-top: 7px; background: white; border-radius: 11px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.week-card.today { box-shadow: 0 0 0 2px #16a34a; }
.week-head { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
.week-head.today { background: #f0fdf4; }
.week-head.sun { background: #fff5f5; }
.week-head.sat { background: #f0fdf4; }

/* 予約カード */
.res-card { display: flex; align-items: center; gap: 8px; border-radius: 10px; padding: 8px 10px; border: 1px solid; margin-bottom: 5px; }
.res-card:last-child { margin-bottom: 0; }

/* ボタン */
.btn-edit { background: #374151; color: white; border-radius: 7px; padding: 5px 9px; font-size: 11px; font-weight: 600; }
.btn-del  { background: #ef4444; color: white; border-radius: 7px; padding: 5px 9px; font-size: 11px; font-weight: 600; }
.btn-add  { color: white; border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 600; }
.btn-green { background: #16a34a; color: white; border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 600; }
.btn-primary { width: 100%; padding: 13px; border-radius: 11px; background: #16a34a; color: white; font-size: 14px; font-weight: 700; }
.btn-cancel { flex: 1; padding: 11px; border-radius: 9px; border: 1.5px solid #e5e7eb !important; background: white; font-size: 13px; font-weight: 600; color: #374151; }
.btn-danger { flex: 1; padding: 11px; border-radius: 9px; background: #ef4444; color: white; font-size: 13px; font-weight: 700; }

/* モーダル */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; z-index: 100; }
.sheet { background: white; width: 100%; border-radius: 18px 18px 0 0; padding: 22px 18px 38px; }
.overlay-center { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 0 20px; }
.dialog { background: white; border-radius: 15px; padding: 22px 18px; width: 100%; max-width: 330px; }

/* フォーム */

.form-sel { padding: 9px 10px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 15px; color: #1a1a1a; background: white; flex: 1; }
.purpose-btn { padding: 7px 13px; border-radius: 18px; border: 2px solid #e5e7eb; background: white; font-size: 13px; color: #374151; font-weight: 400; }
.purpose-btn.active { font-weight: 700; }

/* エラー */
.err-box { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 9px; padding: 9px 12px; margin-bottom: 12px; display: flex; gap: 7px; align-items: flex-start; color: #b91c1c; font-size: 12px; font-weight: 600; }

.hidden { display: none !important; }
#view-month, #view-week, #view-list { padding-bottom: 80px; }
</style>

<script>
// ===== データ =====
const USERS = [
  {id:"father", name:"博",  emoji:"👨", color:"#2563eb"},
  {id:"mother", name:"恭子", emoji:"👩", color:"#db2777"},
];
const PURPOSES = ["仕事","買い物","病院","オケ","その他"];
const HOURS = Array.from({length:18},(_,i)=>i+6);
const MINS  = [0,15,30,45];

window._reservations = [];
let currentUser = null;
let currentView = "month";
let baseDate    = new Date();
let detailDate  = null; // dateStr
let editId      = null; // 編集中の予約ID
let modalDate   = null; // モーダルで選択中の日付
let deleteTargetId = null;
let formNote    = "";

// ===== ユーティリティ =====
function toM(h,m){ return h*60+m; }
function mH(m){ return Math.floor(m/60); }
function mM(m){ return m%60; }
function fmt(m){ return `${mH(m)}:${String(mM(m)).padStart(2,"0")}`; }
function norm(v){ return v<100 ? Math.round(v*60) : v; }
function fdate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function today(){ return fdate(new Date()); }
function fjp(d){ return {mo:d.getMonth()+1, da:d.getDate(), dw:["日","月","火","水","木","金","土"][d.getDay()]}; }
function getRes(ds){ return window._reservations.filter(r=>r.date===ds); }
function userOf(id){ return USERS.find(u=>u.id===id); }

// ===== ユーザー選択 =====
function selectUser(id){
  if(currentUser && currentUser.id===id){ currentUser=null; }
  else { currentUser = USERS.find(u=>u.id===id); }
  document.getElementById("btn-father").className = "user-btn" + (currentUser?.id==="father"?" active":"");
  document.getElementById("btn-mother").className = "user-btn" + (currentUser?.id==="mother"?" active":"");
  document.getElementById("hint").style.display = currentUser ? "none" : "block";
  render();
}

// ===== タブ切替 =====
function switchView(v){
  currentView = v;
  ["month","week","list"].forEach(x=>{
    document.getElementById("view-"+x).classList.toggle("hidden", x!==v);
  });
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    b.classList.toggle("active", ["month","week","list"][i]===v);
  });
  render();
}

// ===== レンダリング =====
function render(){
  if(currentView==="month") renderMonth();
  if(currentView==="week")  renderWeek();
  if(currentView==="list")  renderList();
}

// ===== 月表示 =====
function renderMonth(){
  const y=baseDate.getFullYear(), mo=baseDate.getMonth();
  document.getElementById("month-title").textContent = `${y}年 ${mo+1}月`;
  const first=new Date(y,mo,1), off=first.getDay();
  const cells=Array.from({length:42},(_,i)=>new Date(y,mo,1-off+i));
  const td = today();

  // 凡例
  const leg = document.getElementById("month-legend");
  leg.innerHTML = USERS.map(u=>`<div class="legend-item"><div class="legend-dot" style="background:${u.color}"></div>${u.emoji}</div>`).join("");

  // グリッド
  const grid = document.getElementById("month-grid");
  grid.innerHTML = "";
  cells.forEach(date=>{
    const ds=fdate(date), inM=date.getMonth()===mo;
    const isT=ds===td, dr=getRes(ds), dow=date.getDay();
    const isSel=detailDate===ds;
    const cell=document.createElement("div");
    cell.className="day-cell"+(inM?"":" other")+(isT?" today":"")+(isSel?" selected":"");
    const numColor=isT?"":dow===0?"#ef4444":dow===6?"#3b82f6":"#1a1a1a";
    const badges=dr.sort((a,b)=>norm(a.startHour)-norm(b.startHour)).slice(0,3).map(r=>{
      const u=userOf(r.userId);
      return `<div class="res-badge" style="background:${u?.color}">${u?.name} ${fmt(norm(r.startHour))}〜</div>`;
    }).join("")+(dr.length>3?`<div style="font-size:8px;color:#9ca3af">+${dr.length-3}件</div>`:"");
    cell.innerHTML=`<div class="day-num${isT?" today":""}"><span style="color:${isT?"white":numColor};font-weight:${isT?700:400}">${date.getDate()}</span></div>${badges}`;
    if(inM){
      cell.onclick=()=>{
        if(dr.length>0){ detailDate=(isSel?null:ds); renderMonth(); renderDetail(); }
        else { openModal(date,9); }
      };
    }
    grid.appendChild(cell);
  });
  renderDetail();
}

function renderDetail(){
  const panel=document.getElementById("detail-panel");
  if(!detailDate){ panel.classList.remove("open"); return; }
  const dr=getRes(detailDate);
  const d=new Date(detailDate+"T00:00:00"), {mo,da,dw}=fjp(d);
  document.getElementById("detail-title").textContent=`${mo}月${da}日（${dw}）`;
  document.getElementById("detail-add-btn").style.display=currentUser?"":"none";
  const list=document.getElementById("detail-list");
  list.innerHTML=dr.sort((a,b)=>norm(a.startHour)-norm(b.startHour)).map(r=>resCardHTML(r,false)).join("");
  panel.classList.add("open");
}

function detailAddNew(){
  if(!currentUser||!detailDate) return;
  openModal(new Date(detailDate+"T00:00:00"),9);
}
function closeDetail(){ detailDate=null; renderMonth(); }

// ===== 週表示 =====
function renderWeek(){
  const d=new Date(baseDate), diff=d.getDate()-d.getDay();
  const days=Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(diff+i);return x;});
  document.getElementById("week-title").textContent=`${days[0].getMonth()+1}/${days[0].getDate()} 〜 ${days[6].getMonth()+1}/${days[6].getDate()}`;
  document.getElementById("week-legend").innerHTML=USERS.map(u=>`<div class="legend-item"><div class="legend-dot" style="background:${u.color}"></div>${u.emoji} ${u.name}</div>`).join("");
  const td=today();
  const list=document.getElementById("week-list");
  list.innerHTML=days.map(date=>{
    const ds=fdate(date), dr=getRes(ds), isT=ds===td;
    const {mo,da,dw}=fjp(date), isSun=date.getDay()===0, isSat=date.getDay()===6;
    const headCls=isT?"today":isSun?"sun":isSat?"sat":"";
    const cards=dr.sort((a,b)=>norm(a.startHour)-norm(b.startHour)).map(r=>resCardHTML(r,false)).join("");
    const addBtn=currentUser?`<button class="btn-add" style="background:${currentUser.color}" onclick="openModalByDateStr('${ds}',9)">＋ 予約</button>`:"";
    const numColor=isT?"white":isSun?"#ef4444":isSat?"#3b82f6":"#1a1a1a";
    return `<div class="week-card${isT?" today":""}">
      <div class="week-head ${headCls}" style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid #f0f0f0">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:34px;height:34px;border-radius:50%;background:${isT?"#16a34a":"transparent"};display:flex;align-items:center;justify-content:center;flex-direction:column">
            <span style="font-size:15px;font-weight:700;color:${numColor};line-height:1">${da}</span>
            <span style="font-size:9px;color:${isT?"rgba(255,255,255,0.8)":isSun?"#ef4444":isSat?"#3b82f6":"#9ca3af"}">${dw}</span>
          </div>
          <span style="font-size:11px;color:#9ca3af">${mo}月</span>
          ${isT?'<span style="font-size:9px;background:#16a34a;color:white;border-radius:5px;padding:1px 5px">今日</span>':""}
        </div>
        ${addBtn}
      </div>
      <div style="padding:7px 12px 9px">
        ${dr.length===0?'<div style="font-size:12px;color:#d1d5db;text-align:center;padding:3px 0">予約なし</div>':cards}
      </div>
    </div>`;
  }).join("");
}

// ===== 一覧 =====
function renderList(){
  const td=today();
  const list=[...window._reservations].filter(r=>r.date>=td).sort((a,b)=>a.date.localeCompare(b.date)||norm(a.startHour)-norm(b.startHour));
  const el=document.getElementById("list-content");
  if(list.length===0){ el.innerHTML='<div style="text-align:center;padding:60px 0;color:#9ca3af"><div style="font-size:44px;margin-bottom:10px">🚗</div><div>今後の予約はありません</div></div>'; return; }
  el.innerHTML=list.map(r=>resCardHTML(r,true)).join("");
}

// ===== 予約カードHTML =====
function resCardHTML(res, showDate){
  const u=userOf(res.userId), mine=currentUser?.id===res.userId;
  const {mo,da,dw}=fjp(new Date(res.date+"T00:00:00"));
  const dateCol=showDate?`<div style="text-align:center;min-width:34px"><div style="font-size:10px;color:#9ca3af">${mo}月</div><div style="font-size:17px;font-weight:700;color:${u?.color};line-height:1">${da}</div><div style="font-size:10px;color:#9ca3af">${dw}</div></div>`:`<span style="font-size:17px">${u?.emoji}</span>`;
  const btns=mine?`<div style="display:flex;gap:5px;flex-shrink:0"><button class="btn-edit" onclick="openEditModal('${res.id}')">編集</button><button class="btn-del" onclick="openDelModal('${res.id}')">削除</button></div>`:"";
  return `<div class="res-card" style="background:${u?.color}12;border-color:${u?.color}33;border-left:4px solid ${u?.color}">
    ${dateCol}
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:700;color:${u?.color}">${fmt(norm(res.startHour))}〜${fmt(norm(res.endHour))}</div>
      <div style="font-size:11px;color:#6b7280">${u?.name}${res.note?`・${res.note}`:""}</div>
    </div>
    ${btns}
  </div>`;
}

// ===== モーダル =====
function initSelects(){
  const sh=document.getElementById("s-hour"), sm=document.getElementById("s-min");
  const eh=document.getElementById("e-hour"), em=document.getElementById("e-min");
  if(!sh.options.length){
    HOURS.forEach(h=>{ sh.add(new Option(h,h)); eh.add(new Option(h,h)); });
    MINS.forEach(m=>{ sm.add(new Option(String(m).padStart(2,"0"),m)); em.add(new Option(String(m).padStart(2,"0"),m)); });
  }
}

function setModalTime(sM, eM){
  document.getElementById("s-hour").value = mH(sM);
  document.getElementById("s-min").value  = mM(sM);
  document.getElementById("e-hour").value = mH(eM);
  document.getElementById("e-min").value  = mM(eM);
}

function getModalTime(){
  const sM=toM(+document.getElementById("s-hour").value, +document.getElementById("s-min").value);
  const eM=toM(+document.getElementById("e-hour").value, +document.getElementById("e-min").value);
  return {sM, eM};
}

function onStartHourChange(){
  const h=+document.getElementById("s-hour").value, m=+document.getElementById("s-min").value;
  const s=toM(h,m);
  document.getElementById("e-hour").value=mH(s+60);
  document.getElementById("e-min").value=mM(s+60);
}
function onStartMinChange(){
  const h=+document.getElementById("s-hour").value, m=+document.getElementById("s-min").value;
  const s=toM(h,m);
  document.getElementById("e-hour").value=mH(s+60);
  document.getElementById("e-min").value=mM(s+60);
}

function renderPurposeBtns(editUser){
  const color=editUser?.color||"#16a34a";
  document.getElementById("purpose-btns").innerHTML=PURPOSES.map(p=>`<button class="purpose-btn${formNote===p?" active":""}" style="${formNote===p?`border-color:${color};background:${color}18;color:${color}`:""}" onclick="selectPurpose('${p}')">${p}</button>`).join("");
}

function selectPurpose(p){ formNote=p; const eu=editId?userOf(window._reservations.find(r=>r.id===editId)?.userId):currentUser; renderPurposeBtns(eu); }

function openModal(date, hour){
  if(!currentUser) return;
  editId=null; modalDate=date; formNote="";
  initSelects();
  setModalTime(toM(hour,0), toM(hour+1,0));
  document.getElementById("modal-title").textContent="🚗 予約を追加";
  const {mo,da,dw}=fjp(date);
  document.getElementById("modal-sub").textContent=`${mo}月${da}日（${dw}）・${currentUser.emoji} ${currentUser.name}`;
  renderPurposeBtns(currentUser);
  document.getElementById("modal-err").classList.add("hidden");
  document.getElementById("modal-save-btn").textContent="予約する";
  document.getElementById("modal-overlay").classList.remove("hidden");
}

function openModalByDateStr(ds, hour){
  openModal(new Date(ds+"T00:00:00"), hour);
}

function openEditModal(id){
  const res=window._reservations.find(r=>r.id===id);
  if(!res||!currentUser||currentUser.id!==res.userId) return;
  editId=id; modalDate=new Date(res.date+"T00:00:00"); formNote=res.note||"";
  initSelects();
  setModalTime(norm(res.startHour), norm(res.endHour));
  document.getElementById("modal-title").textContent="✏️ 予約を編集";
  const {mo,da,dw}=fjp(modalDate), u=userOf(res.userId);
  document.getElementById("modal-sub").textContent=`${mo}月${da}日（${dw}）・${u?.emoji} ${u?.name}`;
  renderPurposeBtns(u);
  document.getElementById("modal-err").classList.add("hidden");
  document.getElementById("modal-save-btn").textContent="変更を保存";
  document.getElementById("modal-overlay").classList.remove("hidden");
}

function closeModal(){ document.getElementById("modal-overlay").classList.add("hidden"); }

async function saveReservation(){
  const {sM,eM}=getModalTime();
  const ds=fdate(modalDate);
  if(sM>=eM){ showErr("終了時間は開始時間より後にしてください"); return; }
  const conflict=window._reservations.find(r=>{
    if(editId&&r.id===editId) return false;
    const rs=norm(r.startHour), re=norm(r.endHour);
    return r.date===ds && sM<re && eM>rs;
  });
  if(conflict){ const ou=userOf(conflict.userId); showErr(`${ou.name}の予約（${fmt(norm(conflict.startHour))}〜${fmt(norm(conflict.endHour))}）と重なるため予約できません`); return; }
  const id=editId||Date.now().toString();
  const uid=editId?window._reservations.find(r=>r.id===editId).userId:currentUser.id;
  document.getElementById("modal-save-btn").textContent="保存中...";
  await window._fb.save({id, userId:uid, date:ds, startHour:sM, endHour:eM, note:formNote});
  closeModal();
}

function showErr(msg){
  document.getElementById("modal-err-txt").textContent=msg;
  document.getElementById("modal-err").classList.remove("hidden");
}

// ===== 削除 =====
function openDelModal(id){
  deleteTargetId=id;
  const res=window._reservations.find(r=>r.id===id), u=userOf(res?.userId);
  document.getElementById("del-info").innerHTML=`<div style="font-size:12px;font-weight:700;color:${u?.color}">${u?.emoji} ${u?.name}</div><div style="font-size:12px;color:#374151">${res?.date}　${fmt(norm(res?.startHour))}〜${fmt(norm(res?.endHour))}</div>${res?.note?`<div style="font-size:11px;color:#6b7280">${res.note}</div>`:""}`;
  document.getElementById("del-overlay").classList.remove("hidden");
}
function closeDelModal(){ document.getElementById("del-overlay").classList.add("hidden"); deleteTargetId=null; }
async function confirmDelete(){
  if(!deleteTargetId) return;
  await window._fb.del(deleteTargetId);
  closeDelModal();
}

// ===== ナビ =====
function prevMonth(){ baseDate=new Date(baseDate.getFullYear(), baseDate.getMonth()-1, 1); detailDate=null; renderMonth(); }
function nextMonth(){ baseDate=new Date(baseDate.getFullYear(), baseDate.getMonth()+1, 1); detailDate=null; renderMonth(); }
function prevWeek(){ baseDate=new Date(baseDate); baseDate.setDate(baseDate.getDate()-7); renderWeek(); }
function nextWeek(){ baseDate=new Date(baseDate); baseDate.setDate(baseDate.getDate()+7); renderWeek(); }

// ===== 初期描画 =====
render();
</script>


</body></html>
