    };

    window._firebaseReady = true;
    window.dispatchEvent(new Event("firebaseReady"));
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // テーマカラー（緑）
    const THEME = "#16a34a";
    const THEME_DARK = "#14532d";
    const THEME_LIGHT = "#f0fdf4";

    const USERS = [
      { id: "father", name: "博", emoji: "👨", color: "#2563eb" },
      { id: "mother", name: "恭子", emoji: "👩", color: "#db2777" },
    ];

    const HOURS_LIST = Array.from({ length: 18 }, (_, i) => i + 6);
    const MINS_LIST = [0, 15, 30, 45];

    function toMins(h, m) { return h * 60 + m; }
    function minsToH(mins) { return Math.floor(mins / 60); }
    function minsToM(mins) { return mins % 60; }
    function fmtMins(mins) { return `${minsToH(mins)}:${String(minsToM(mins)).padStart(2,"0")}`; }
    function normalizeMins(v) { return v < 100 ? Math.round(v * 60) : v; }
    function formatDate(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
    }
    function formatJP(date) {
      return { month: date.getMonth()+1, day: date.getDate(), dow: ["日","月","火","水","木","金","土"][date.getDay()] };
    }
    function getWeekDates(base) {
      const d = new Date(base), diff = d.getDate() - d.getDay();
      return Array.from({length:7}, (_,i) => { const dd = new Date(d); dd.setDate(diff+i); return dd; });
    }
    function getMonthGrid(base) {
      const year = base.getFullYear(), month = base.getMonth();
      const first = new Date(year, month, 1), offset = first.getDay();
      return { cells: Array.from({length:42}, (_,i) => new Date(year, month, 1-offset+i)), year, month };
    }

    const navBtn = { background:"#f3f4f6", border:"none", borderRadius:8, width:36, height:36, fontSize:20, cursor:"pointer", color:"#374151", display:"inline-flex", alignItems:"center", justifyContent:"center" };
    const lbl = { display:"block", fontSize:12, fontWeight:600, color:"#6b7280", marginBottom:6 };
    const sel = { padding:"10px 12px", border:"1.5px solid #e5e7eb", borderRadius:10, fontSize:15, color:"#1a1a1a", background:"white", flex:1 };

    function App() {
      const [reservations, setReservations] = useState([]);
      const [currentUser, setCurrentUser] = useState(null);
      const [baseDate, setBaseDate] = useState(new Date());
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({ startMins:540, endMins:600, note:"" });
      const [conflictError, setConflictError] = useState("");
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const [view, setView] = useState("month");
      const [syncing, setSyncing] = useState(false);
      const [connected, setConnected] = useState(false);
      // 月表示で日付をタップしたときの詳細パネル
      const [dayDetail, setDayDetail] = useState(null); // dateStr

      useEffect(() => {
        const init = () => {
          if (!window._firebase) return;
          setConnected(true);
          window._firebase.listenReservations(data => setReservations(data));
        };
        if (window._firebaseReady) init();
        else window.addEventListener("firebaseReady", init, { once: true });
      }, []);

      const getRes = (dateStr) => reservations.filter(r => r.date === dateStr);

      const openModal = (date, hour) => {
        if (!currentUser) return;
        const s = toMins(hour, 0);
        setForm({ startMins:s, endMins:s+60, note:"" });
        setConflictError("");
        setModal({ date, editId: null });
      };

      const openEditModal = (res) => {
        if (!currentUser || currentUser.id !== res.userId) return;
        setForm({
          startMins: normalizeMins(res.startHour),
          endMins: normalizeMins(res.endHour),
          note: res.note || "",
        });
        setConflictError("");
        setModal({ date: new Date(res.date+"T00:00:00"), editId: res.id });
      };

      const saveReservation = async () => {
        if (form.startMins >= form.endMins) { setConflictError("終了時間は開始時間より後にしてください"); return; }
        const dateStr = formatDate(modal.date);
        const conflict = reservations.find(r => {
          if (modal.editId && r.id === modal.editId) return false;
          const rs = normalizeMins(r.startHour), re = normalizeMins(r.endHour);
          return r.date === dateStr && form.startMins < re && form.endMins > rs;
        });
        if (conflict) {
          const other = USERS.find(u => u.id === conflict.userId);
          setConflictError(`${other.name}の予約（${fmtMins(normalizeMins(conflict.startHour))}〜${fmtMins(normalizeMins(conflict.endHour))}）と重なるため予約できません`);
          return;
        }
        setSyncing(true);
        const id = modal.editId || Date.now().toString();
        await window._firebase.saveReservation({
          id,
          userId: modal.editId ? reservations.find(r=>r.id===modal.editId).userId : currentUser.id,
          date: dateStr,
          startHour: form.startMins,
          endHour: form.endMins,
          note: form.note,
        });
        setSyncing(false);
        setConflictError("");
        setModal(null);
      };

      const confirmDelete = async () => {
        if (!deleteConfirm) return;
        setSyncing(true);
        await window._firebase.deleteReservation(deleteConfirm);
        setSyncing(false);
        setDeleteConfirm(null);
      };

      const prevWeek = () => { const d=new Date(baseDate); d.setDate(d.getDate()-7); setBaseDate(d); };
      const nextWeek = () => { const d=new Date(baseDate); d.setDate(d.getDate()+7); setBaseDate(d); };
      const prevMonth = () => { const d=new Date(baseDate); d.setDate(1); d.setMonth(d.getMonth()-1); setBaseDate(d); };
      const nextMonth = () => { const d=new Date(baseDate); d.setDate(1); d.setMonth(d.getMonth()+1); setBaseDate(d); };

      const todayStr = formatDate(new Date());
      const weekDates = getWeekDates(baseDate);
      const upcoming = [...reservations].filter(r => r.date >= todayStr)
        .sort((a,b) => a.date.localeCompare(b.date) || normalizeMins(a.startHour)-normalizeMins(b.startHour));

      const isEditMode = modal?.editId != null;

      // 予約カード（週表示・一覧・月詳細で共通）
      const ResCard = ({res, showDate=false}) => {
        const user = USERS.find(u=>u.id===res.userId);
        const canEdit = currentUser?.id === res.userId;
        const d = new Date(res.date+"T00:00:00");
        const {month,day,dow} = formatJP(d);
        return (
          <div style={{display:"flex",alignItems:"center",gap:8,background:`${user?.color}12`,border:`1px solid ${user?.color}44`,borderLeft:`4px solid ${user?.color}`,borderRadius:10,padding:"8px 10px"}}>
            {showDate && (
              <div style={{textAlign:"center",minWidth:36}}>
                <div style={{fontSize:10,color:"#9ca3af"}}>{month}月</div>
                <div style={{fontSize:18,fontWeight:700,lineHeight:1,color:user?.color}}>{day}</div>
                <div style={{fontSize:10,color:"#9ca3af"}}>{dow}</div>
              </div>
            )}
            {!showDate && <span style={{fontSize:18}}>{user?.emoji}</span>}
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:user?.color}}>{fmtMins(normalizeMins(res.startHour))} 〜 {fmtMins(normalizeMins(res.endHour))}</div>
              <div style={{fontSize:11,color:"#6b7280"}}>{user?.name}{res.note&&`・${res.note}`}</div>
            </div>
            {canEdit && (
              <div style={{display:"flex",gap:6}}>
                <button onClick={() => openEditModal(res)} style={{background:"#374151",border:"none",cursor:"pointer",fontSize:11,color:"white",borderRadius:7,padding:"5px 9px",fontWeight:600}}>編集</button>
                <button onClick={() => setDeleteConfirm(res.id)} style={{background:"#ef4444",border:"none",cursor:"pointer",fontSize:11,color:"white",borderRadius:7,padding:"5px 9px",fontWeight:600}}>削除</button>
              </div>
            )}
          </div>
        );
      };

      return (
        <div style={{minHeight:"100vh",background:"#f8f7f4"}}>

          {/* Header */}
          <div style={{background:`linear-gradient(135deg,${THEME_DARK} 0%,${THEME} 100%)`,color:"white",padding:"20px 16px 16px",boxShadow:"0 2px 12px rgba(22,163,74,0.35)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <span style={{fontSize:28}}>🚗</span>
              <div style={{flex:1}}>
                <div style={{fontSize:18,fontWeight:700,letterSpacing:1}}>Vitz予約</div>
                <div style={{fontSize:11,opacity:0.8}}>Family Car Schedule</div>
              </div>
              <div style={{fontSize:10,opacity:0.8,display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:connected?"#86efac":"#f87171"}}/>
                {connected?"接続中":"接続待ち"}
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              {USERS.map(u => (
                <button key={u.id} onClick={() => setCurrentUser(currentUser?.id===u.id ? null : u)} style={{flex:1,padding:"10px 8px",borderRadius:12,border:currentUser?.id===u.id?"2.5px solid white":"2px solid rgba(255,255,255,0.3)",background:currentUser?.id===u.id?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.1)",color:"white",cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                  <span style={{fontSize:20}}>{u.emoji}</span>{u.name}
                  {currentUser?.id===u.id && <span style={{fontSize:10,background:"white",color:THEME,borderRadius:6,padding:"1px 6px"}}>操作中</span>}
                </button>
              ))}
            </div>
            {!currentUser && <div style={{marginTop:8,fontSize:11,opacity:0.7,textAlign:"center"}}>予約するには上で名前を選んでください</div>}
          </div>

          {/* Tabs */}
          <div style={{display:"flex",background:"white",borderBottom:"1px solid #e5e7eb"}}>
            {[["month","🗓 月表示"],["week","📅 週表示"],["list","📋 一覧"]].map(([v,label]) => (
              <button key={v} onClick={() => setView(v)} style={{flex:1,padding:"12px 0",border:"none",background:"none",cursor:"pointer",fontSize:12,fontWeight:600,color:view===v?THEME:"#9ca3af",borderBottom:view===v?`2.5px solid ${THEME}`:"2.5px solid transparent"}}>{label}</button>
            ))}
          </div>

          {/* 月表示 */}
          {view==="month" && (() => {
            const {cells,year,month} = getMonthGrid(baseDate);
            return (
              <div style={{paddingBottom:80}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"white",borderBottom:"1px solid #e5e7eb"}}>
                  <button onClick={prevMonth} style={navBtn}>‹</button>
                  <span style={{fontSize:15,fontWeight:700}}>{year}年 {month+1}月</span>
                  <button onClick={nextMonth} style={navBtn}>›</button>
                </div>
                <div style={{display:"flex",gap:12,padding:"8px 16px",background:"#f8f7f4"}}>
                  {USERS.map(u => <div key={u.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:12}}><div style={{width:10,height:10,borderRadius:3,background:u.color}}/>{u.emoji}</div>)}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"white",borderBottom:"1px solid #e5e7eb"}}>
                  {["日","月","火","水","木","金","土"].map((d,i) => <div key={d} style={{textAlign:"center",padding:"6px 0",fontSize:11,fontWeight:700,color:i===0?"#ef4444":i===6?"#3b82f6":"#6b7280"}}>{d}</div>)}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"#e5e7eb"}}>
                  {cells.map((date,idx) => {
                    const dateStr=formatDate(date), inMonth=date.getMonth()===month;
                    const isToday=dateStr===todayStr, dayRes=getRes(dateStr);
                    const dow=date.getDay(), isSat=dow===6, isSun=dow===0;
                    const isSelected=dayDetail===dateStr;
                    return (
                      <div key={idx} onClick={() => {
                        if (!inMonth) return;
                        if (dayRes.length > 0) {
                          // 予約がある日：詳細パネルを開く
                          setDayDetail(isSelected ? null : dateStr);
                        } else {
                          // 予約がない日：新規モーダルを開く
                          openModal(date, 9);
                        }
                      }} style={{background:isSelected?THEME_LIGHT:isToday?"#f0fdf4":"white",minHeight:64,padding:"4px",cursor:inMonth?"pointer":"default",opacity:inMonth?1:0.35,outline:isSelected?`2px solid ${THEME}`:"none"}}>
                        <div style={{width:24,height:24,borderRadius:"50%",background:isToday?THEME:"transparent",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:3}}>
                          <span style={{fontSize:12,fontWeight:isToday?700:500,color:isToday?"white":isSun?"#ef4444":isSat?"#3b82f6":"#1a1a1a"}}>{date.getDate()}</span>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:2}}>
                          {dayRes.sort((a,b)=>normalizeMins(a.startHour)-normalizeMins(b.startHour)).slice(0,3).map(res => {
                            const u=USERS.find(u=>u.id===res.userId);
                            return <div key={res.id} style={{background:u?.color,color:"white",borderRadius:3,fontSize:9,fontWeight:600,padding:"1px 4px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{u?.name} {fmtMins(normalizeMins(res.startHour))}〜</div>;
                          })}
                          {dayRes.length>3 && <div style={{fontSize:9,color:"#9ca3af",paddingLeft:2}}>+{dayRes.length-3}件</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 月表示：日付詳細パネル */}
                {dayDetail && (() => {
                  const dayRes = getRes(dayDetail);
                  const detailDate = new Date(dayDetail+"T00:00:00");
                  const {month:dm, day:dd, dow:dw} = formatJP(detailDate);
                  return (
                    <div style={{margin:"8px 8px 0",background:"white",borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,0.1)",overflow:"hidden"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:THEME_LIGHT,borderBottom:`1px solid ${THEME}44`}}>
                        <span style={{fontSize:14,fontWeight:700,color:THEME}}>{dm}月{dd}日（{dw}）の予約</span>
                        <div style={{display:"flex",gap:8}}>
                          {currentUser && <button onClick={() => { setDayDetail(null); openModal(detailDate,9); }} style={{fontSize:11,background:THEME,color:"white",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:600}}>＋ 予約</button>}
                          <button onClick={() => setDayDetail(null)} style={{fontSize:16,background:"none",border:"none",cursor:"pointer",color:"#9ca3af",padding:"0 2px"}}>✕</button>
                        </div>
                      </div>
                      <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
                        {dayRes.sort((a,b)=>normalizeMins(a.startHour)-normalizeMins(b.startHour)).map(res => (
                          <ResCard key={res.id} res={res} />
                        ))}
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          })()}

          {/* 週表示 */}
          {view==="week" && (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"white",borderBottom:"1px solid #e5e7eb"}}>
                <button onClick={prevWeek} style={navBtn}>‹</button>
                <span style={{fontSize:14,fontWeight:600}}>{weekDates[0].getMonth()+1}/{weekDates[0].getDate()} 〜 {weekDates[6].getMonth()+1}/{weekDates[6].getDate()}</span>
                <button onClick={nextWeek} style={navBtn}>›</button>
              </div>
              <div style={{display:"flex",gap:12,padding:"8px 16px",background:"#f8f7f4"}}>
                {USERS.map(u => <div key={u.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:12}}><div style={{width:12,height:12,borderRadius:3,background:u.color}}/>{u.emoji} {u.name}</div>)}
              </div>
              <div style={{padding:"0 8px 80px"}}>
                {weekDates.map(date => {
                  const dateStr=formatDate(date), {month,day,dow}=formatJP(date);
                  const dayRes=getRes(dateStr), isToday=dateStr===todayStr;
                  const isSun=date.getDay()===0, isSat=date.getDay()===6;
                  return (
                    <div key={dateStr} style={{marginTop:8,background:"white",borderRadius:12,overflow:"hidden",boxShadow:isToday?`0 0 0 2px ${THEME}`:"0 1px 4px rgba(0,0,0,0.07)"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",background:isToday?THEME_LIGHT:isSun?"#fff5f5":isSat?"#f0f9ff":"#fafafa",borderBottom:"1px solid #f0f0f0"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:36,height:36,borderRadius:"50%",background:isToday?THEME:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
                            <span style={{fontSize:16,fontWeight:700,color:isToday?"white":isSun?"#ef4444":isSat?"#3b82f6":"#1a1a1a",lineHeight:1}}>{day}</span>
                            <span style={{fontSize:9,color:isToday?"rgba(255,255,255,0.8)":isSun?"#ef4444":isSat?"#3b82f6":"#9ca3af"}}>{dow}</span>
                          </div>
                          <span style={{fontSize:11,color:"#9ca3af"}}>{month}月</span>
                          {isToday && <span style={{fontSize:10,background:THEME,color:"white",borderRadius:6,padding:"1px 6px"}}>今日</span>}
                        </div>
                        {currentUser && <button onClick={() => openModal(date,9)} style={{fontSize:11,background:THEME,color:"white",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:600}}>＋ 予約</button>}
                      </div>
                      <div style={{padding:"8px 14px 10px"}}>
                        {dayRes.length===0
                          ? <div style={{fontSize:12,color:"#d1d5db",textAlign:"center",padding:"4px 0"}}>予約なし</div>
                          : <div style={{display:"flex",flexDirection:"column",gap:6}}>
                              {dayRes.sort((a,b)=>normalizeMins(a.startHour)-normalizeMins(b.startHour)).map(res => (
                                <ResCard key={res.id} res={res} />
                              ))}
                            </div>
                        }
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 一覧 */}
          {view==="list" && (
            <div style={{padding:"12px 12px 80px"}}>
              {upcoming.length===0
                ? <div style={{textAlign:"center",padding:"60px 20px",color:"#9ca3af"}}><div style={{fontSize:48,marginBottom:12}}>🚗</div><div style={{fontSize:15}}>今後の予約はありません</div></div>
                : <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {upcoming.map(res => <ResCard key={res.id} res={res} showDate={true} />)}
                  </div>
              }
            </div>
          )}

          {/* 予約モーダル（新規・編集共通） */}
          {modal && (
            <div onClick={() => setModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:100}}>
              <div onClick={e => e.stopPropagation()} style={{background:"white",width:"100%",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px"}}>
                <div style={{width:36,height:4,background:"#e5e7eb",borderRadius:2,margin:"0 auto 20px"}}/>
                <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>
                  {isEditMode ? "✏️ 予約を編集" : "🚗 予約を追加"}
                </div>
                <div style={{fontSize:13,color:"#6b7280",marginBottom:20}}>
                  {(() => { const {month,day,dow}=formatJP(modal.date); return `${month}月${day}日（${dow}）`; })()}
                  {!isEditMode && `・${currentUser?.emoji} ${currentUser?.name}`}
                  {isEditMode && (() => {
                    const res=reservations.find(r=>r.id===modal.editId);
                    const u=USERS.find(u=>u.id===res?.userId);
                    return `・${u?.emoji} ${u?.name}`;
                  })()}
                </div>
                <div style={{marginBottom:16}}>
                  <label style={lbl}>開始時間</label>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <select value={minsToH(form.startMins)} onChange={e => { const h=Number(e.target.value),s=toMins(h,minsToM(form.startMins)); setForm({...form,startMins:s,endMins:s+60}); setConflictError(""); }} style={sel}>
                      {HOURS_LIST.map(h => <option key={h} value={h}>{h}</option>)}
                    </select>
                    <span style={{fontSize:14,color:"#374151",whiteSpace:"nowrap"}}>時</span>
                    <select value={minsToM(form.startMins)} onChange={e => { const m=Number(e.target.value),s=toMins(minsToH(form.startMins),m); setForm({...form,startMins:s,endMins:s+60}); setConflictError(""); }} style={sel}>
                      {MINS_LIST.map(m => <option key={m} value={m}>{String(m).padStart(2,"0")}</option>)}
                    </select>
                    <span style={{fontSize:14,color:"#374151",whiteSpace:"nowrap"}}>分</span>
                  </div>
                </div>
                <div style={{marginBottom:16}}>
                  <label style={lbl}>終了時間</label>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <select value={minsToH(form.endMins)} onChange={e => { setForm({...form,endMins:toMins(Number(e.target.value),minsToM(form.endMins))}); setConflictError(""); }} style={sel}>
                      {HOURS_LIST.map(h => <option key={h} value={h}>{h}</option>)}
                    </select>
                    <span style={{fontSize:14,color:"#374151",whiteSpace:"nowrap"}}>時</span>
                    <select value={minsToM(form.endMins)} onChange={e => { setForm({...form,endMins:toMins(minsToH(form.endMins),Number(e.target.value))}); setConflictError(""); }} style={sel}>
                      {MINS_LIST.map(m => <option key={m} value={m}>{String(m).padStart(2,"0")}</option>)}
                    </select>
                    <span style={{fontSize:14,color:"#374151",whiteSpace:"nowrap"}}>分</span>
                  </div>
                </div>
                <div style={{marginBottom:24}}>
                  <label style={lbl}>目的</label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {["仕事","買い物","病院","オケ","その他"].map(opt => {
                      const u = isEditMode ? USERS.find(u=>u.id===reservations.find(r=>r.id===modal.editId)?.userId) : currentUser;
                      return (
                        <label key={opt} style={{display:"flex",alignItems:"center",padding:"8px 14px",borderRadius:20,cursor:"pointer",border:`2px solid ${form.note===opt?u?.color:"#e5e7eb"}`,background:form.note===opt?`${u?.color}15`:"white",fontSize:14,fontWeight:form.note===opt?700:400,color:form.note===opt?u?.color:"#374151"}}>
                          <input type="radio" name="purpose" value={opt} checked={form.note===opt} onChange={() => setForm({...form,note:opt})} style={{display:"none"}}/>
                          {opt}
                        </label>
                      );
                    })}
                  </div>
                </div>
                {conflictError && (
                  <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"flex-start",gap:8}}>
                    <span style={{fontSize:18,lineHeight:1.2}}>🚫</span>
                    <span style={{fontSize:13,color:"#b91c1c",fontWeight:600,lineHeight:1.4}}>{conflictError}</span>
                  </div>
                )}
                <button onClick={saveReservation} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:THEME,color:"white",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                  {syncing ? "保存中..." : isEditMode ? "変更を保存" : "予約する"}
                </button>
              </div>
            </div>
          )}

          {/* 削除確認モーダル */}
          {deleteConfirm && (() => {
            const res=reservations.find(r=>r.id===deleteConfirm);
            const user=USERS.find(u=>u.id===res?.userId);
            return (
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"0 24px"}}>
                <div style={{background:"white",borderRadius:16,padding:"24px 20px",width:"100%",maxWidth:340}}>
                  <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>🗑️</div>
                  <div style={{fontSize:15,fontWeight:700,textAlign:"center",marginBottom:8}}>予約を削除しますか？</div>
                  {res && (
                    <div style={{background:"#f8f7f4",borderRadius:10,padding:"10px 14px",marginBottom:20,textAlign:"center"}}>
                      <div style={{fontSize:13,fontWeight:700,color:user?.color}}>{user?.emoji} {user?.name}</div>
                      <div style={{fontSize:13,color:"#374151"}}>{res.date}　{fmtMins(normalizeMins(res.startHour))}〜{fmtMins(normalizeMins(res.endHour))}</div>
                      {res.note && <div style={{fontSize:12,color:"#6b7280"}}>{res.note}</div>}
                    </div>
                  )}
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={() => setDeleteConfirm(null)} style={{flex:1,padding:"12px",borderRadius:10,border:"1.5px solid #e5e7eb",background:"white",fontSize:14,fontWeight:600,cursor:"pointer",color:"#374151"}}>キャンセル</button>
                    <button onClick={confirmDelete} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:"#ef4444",color:"white",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                      {syncing ? "削除中..." : "削除する"}
                    </button>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>


</body></html>
