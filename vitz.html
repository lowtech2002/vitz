function toM(h,m){return h*60+m;}
function mH(m){return Math.floor(m/60);}
function mM(m){return m%60;}
function fmt(m){return `${mH(m)}:${String(mM(m)).padStart(2,"0")}`;}
function norm(v){return v<100?Math.round(v*60):v;}
function fdate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fjp(d){return{mo:d.getMonth()+1, da:d.getDate(), dw:["日","月","火","水","木","金","土"][d.getDay()]};}

function weekOf(base){
  const d=new Date(base), diff=d.getDate()-d.getDay();
  return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(diff+i);return x;});
}
function monthGrid(base){
  const y=base.getFullYear(), mo=base.getMonth();
  const first=new Date(y,mo,1), off=first.getDay();
  return {cells:Array.from({length:42},(_,i)=>new Date(y,mo,1-off+i)), y, mo};

  const openEdit = (res) => {
    if(!user || user.id!==res.userId) return;
    setForm({sM:norm(res.startHour), eM:norm(res.endHour), note:res.note||""});
    setErr("");
    setModal({date:new Date(res.date+"T00:00:00"), editId:res.id});
  };

  const save = async () => {
    if(form.sM>=form.eM){setErr("終了時間は開始時間より後にしてください");return;}
    const ds = fdate(modal.date);
    const conflict = reservations.find(r=>{
      if(modal.editId && r.id===modal.editId) return false;
      const rs=norm(r.startHour), re=norm(r.endHour);
      return r.date===ds && form.sM<re && form.eM>rs;
    });
    if(conflict){
      const ou = USERS.find(u=>u.id===conflict.userId);
      setErr(`${ou.name}の予約（${fmt(norm(conflict.startHour))}〜${fmt(norm(conflict.endHour))}）と重なるため予約できません`);
      return;
    }
    setSaving(true);
    const id = modal.editId || Date.now().toString();
    const uid = modal.editId ? reservations.find(r=>r.id===modal.editId).userId : user.id;
    await window._fb.save({id, userId:uid, date:ds, startHour:form.sM, endHour:form.eM, note:form.note});
    setSaving(false);
    setModal(null);
  };

  const doDel = async () => {
    if(!delId) return;
    setSaving(true);
    await window._fb.del(delId);
    setSaving(false);
    setDelId(null);
  };

  const isEdit = modal?.editId != null;

  // ===== 予約カード =====
  const Card = ({res, showDate}) => {
    const u  = USERS.find(x=>x.id===res.userId);
    const {mo,da,dw} = fjp(new Date(res.date+"T00:00:00"));
    const mine = user?.id===res.userId;
    return (
      <div style={S.card(u?.color)}>
        {showDate
          ? <div style={{textAlign:"center", minWidth:34}}>
              <div style={{fontSize:10,color:"#9ca3af"}}>{mo}月</div>
              <div style={{fontSize:17,fontWeight:700,color:u?.color,lineHeight:1}}>{da}</div>
              <div style={{fontSize:10,color:"#9ca3af"}}>{dw}</div>
            </div>
          : <span style={{fontSize:17}}>{u?.emoji}</span>
        }
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:u?.color}}>{fmt(norm(res.startHour))}〜{fmt(norm(res.endHour))}</div>
          <div style={{fontSize:11,color:"#6b7280"}}>{u?.name}{res.note?`・${res.note}`:""}</div>
        </div>
        {mine &&
          <div style={{display:"flex",gap:5}}>
            <button style={S.editBtn} onClick={()=>openEdit(res)}>編集</button>
            <button style={S.delBtn}  onClick={()=>setDelId(res.id)}>削除</button>
          </div>
        }
      </div>
    );
  };

  // ===== ヘッダー =====
  const Header = () => (
    <div style={S.header}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <span style={{fontSize:26}}>🚗</span>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700}}>Vitz予約</div>
          <div style={{fontSize:10,opacity:.8}}>Family Car Schedule</div>
        </div>
        <div style={{fontSize:10,opacity:.8,display:"flex",alignItems:"center",gap:4}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:conn?"#86efac":"#f87171"}}/>
          {conn?"接続中":"接続待ち"}
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        {USERS.map(u=>(
          <button key={u.id}
            onClick={()=>setUser(user?.id===u.id?null:u)}
            style={{flex:1,padding:"9px 6px",borderRadius:11,border:user?.id===u.id?"2.5px solid white":"2px solid rgba(255,255,255,0.3)",background:user?.id===u.id?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.1)",color:"white",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
            <span style={{fontSize:19}}>{u.emoji}</span>{u.name}
            {user?.id===u.id&&<span style={{fontSize:9,background:"white",color:THEME,borderRadius:5,padding:"1px 5px"}}>操作中</span>}
          </button>
        ))}
      </div>
      {!user&&<div style={{marginTop:7,fontSize:11,opacity:.7,textAlign:"center"}}>予約するには名前を選んでください</div>}
    </div>
  );

  // ===== タブ =====
  const Tabs = () => (
    <div style={S.tab}>
      {[["month","🗓 月"],["week","📅 週"],["list","📋 一覧"]].map(([v,l])=>(
        <button key={v} onClick={()=>setView(v)}
          style={{flex:1,padding:"11px 0",border:"none",background:"none",fontSize:12,fontWeight:600,color:view===v?THEME:"#9ca3af",borderBottom:view===v?`2.5px solid ${THEME}`:"2.5px solid transparent"}}>
          {l}
        </button>
      ))}
    </div>
  );

  // ===== 月表示 =====
  const MonthView = () => {
    const {cells,y,mo} = monthGrid(base);
    const detailRes = detail ? getRes(detail) : [];
    const detailDate = detail ? new Date(detail+"T00:00:00") : null;
    return (
      <div style={{paddingBottom:80}}>
        <div style={S.navRow}>
          <button style={S.navBtn} onClick={()=>{const d=new Date(base);d.setDate(1);d.setMonth(d.getMonth()-1);setBase(d);setDetail(null);}}>‹</button>
          <span style={{fontSize:14,fontWeight:700}}>{y}年 {mo+1}月</span>
          <button style={S.navBtn} onClick={()=>{const d=new Date(base);d.setDate(1);d.setMonth(d.getMonth()+1);setBase(d);setDetail(null);}}>›</button>
        </div>
        <div style={{display:"flex",gap:10,padding:"6px 14px",background:"#f8f7f4"}}>
          {USERS.map(u=><div key={u.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:12}}><div style={{width:9,height:9,borderRadius:2,background:u.color}}/>{u.emoji}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"white",borderBottom:"1px solid #e5e7eb"}}>
          {["日","月","火","水","木","金","土"].map((d,i)=>(
            <div key={d} style={{textAlign:"center",padding:"5px 0",fontSize:11,fontWeight:700,color:i===0?"#ef4444":i===6?"#3b82f6":"#6b7280"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"#e5e7eb"}}>
          {cells.map((date,idx)=>{
            const ds = fdate(date);
            const inM = date.getMonth()===mo;
            const isT = ds===today;
            const dr  = getRes(ds);
            const dow  = date.getDay();
            const isSel = detail===ds;
            return (
              <div key={idx}
                onClick={()=>{
                  if(!inM) return;
                  if(dr.length>0){ setDetail(isSel?null:ds); }
                  else { openNew(date,9); }
                }}
                style={{background:isSel?"#dcfce7":isT?"#f0fdf4":"white", minHeight:62, padding:"3px", cursor:inM?"pointer":"default", opacity:inM?1:0.3}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:isT?THEME:"transparent",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:2}}>
                  <span style={{fontSize:11,fontWeight:isT?700:400,color:isT?"white":dow===0?"#ef4444":dow===6?"#3b82f6":"#1a1a1a"}}>{date.getDate()}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:1}}>
                  {dr.sort((a,b)=>norm(a.startHour)-norm(b.startHour)).slice(0,3).map(r=>{
                    const u=USERS.find(u=>u.id===r.userId);
                    return <div key={r.id} style={{background:u?.color,color:"white",borderRadius:2,fontSize:8,fontWeight:600,padding:"1px 3px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u?.name} {fmt(norm(r.startHour))}〜</div>;
                  })}
                  {dr.length>3&&<div style={{fontSize:8,color:"#9ca3af"}}>+{dr.length-3}件</div>}
                </div>
              </div>
            );
          })}
        </div>

        {/* 詳細パネル */}
        {detail && detailDate && (
          <div style={{margin:"8px 8px 0",background:"white",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.1)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:"#dcfce7",borderBottom:`1px solid ${THEME}44`}}>
              <span style={{fontSize:13,fontWeight:700,color:THEME}}>{fjp(detailDate).mo}月{fjp(detailDate).da}日（{fjp(detailDate).dw}）</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {user&&<button style={S.addBtn()} onClick={()=>{setDetail(null);openNew(detailDate,9);}}>＋ 予約</button>}
                <button onClick={()=>setDetail(null)} style={{background:"none",border:"none",fontSize:18,color:"#9ca3af",lineHeight:1}}>✕</button>
              </div>
            </div>
            <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:7}}>
              {detailRes.sort((a,b)=>norm(a.startHour)-norm(b.startHour)).map(r=><Card key={r.id} res={r}/>)}
            </div>
          </div>
        )}
      </div>
    );
  };

  // ===== 週表示 =====
  const WeekView = () => {
    const days = weekOf(base);
    return (
      <div>
        <div style={S.navRow}>
          <button style={S.navBtn} onClick={()=>{const d=new Date(base);d.setDate(d.getDate()-7);setBase(d);}}>‹</button>
          <span style={{fontSize:13,fontWeight:600}}>{days[0].getMonth()+1}/{days[0].getDate()} 〜 {days[6].getMonth()+1}/{days[6].getDate()}</span>
          <button style={S.navBtn} onClick={()=>{const d=new Date(base);d.setDate(d.getDate()+7);setBase(d);}}>›</button>
        </div>
        <div style={{display:"flex",gap:10,padding:"6px 14px",background:"#f8f7f4"}}>
          {USERS.map(u=><div key={u.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:12}}><div style={{width:10,height:10,borderRadius:2,background:u.color}}/>{u.emoji} {u.name}</div>)}
        </div>
        <div style={{padding:"0 7px 80px"}}>
          {days.map(date=>{
            const ds=fdate(date), dr=getRes(ds), isT=ds===today;
            const {mo,da,dw}=fjp(date), isSun=date.getDay()===0, isSat=date.getDay()===6;
            return (
              <div key={ds} style={{marginTop:7,background:"white",borderRadius:11,overflow:"hidden",boxShadow:isT?`0 0 0 2px ${THEME}`:"0 1px 4px rgba(0,0,0,0.07)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",background:isT?"#f0fdf4":isSun?"#fff5f5":isSat?"#eff6ff":"#fafafa",borderBottom:"1px solid #f0f0f0"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{width:34,height:34,borderRadius:"50%",background:isT?THEME:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
                      <span style={{fontSize:15,fontWeight:700,color:isT?"white":isSun?"#ef4444":isSat?"#3b82f6":"#1a1a1a",lineHeight:1}}>{da}</span>
                      <span style={{fontSize:9,color:isT?"rgba(255,255,255,0.8)":isSun?"#ef4444":isSat?"#3b82f6":"#9ca3af"}}>{dw}</span>
                    </div>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{mo}月</span>
                    {isT&&<span style={{fontSize:9,background:THEME,color:"white",borderRadius:5,padding:"1px 5px"}}>今日</span>}
                  </div>
                  {user&&<button style={S.addBtn(user.color)} onClick={()=>openNew(date,9)}>＋ 予約</button>}
                </div>
                <div style={{padding:"7px 12px 9px"}}>
                  {dr.length===0
                    ? <div style={{fontSize:12,color:"#d1d5db",textAlign:"center",padding:"3px 0"}}>予約なし</div>
                    : <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        {dr.sort((a,b)=>norm(a.startHour)-norm(b.startHour)).map(r=><Card key={r.id} res={r}/>)}
                      </div>
                  }
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ===== 一覧 =====
  const ListView = () => {
    const list = [...reservations].filter(r=>r.date>=today).sort((a,b)=>a.date.localeCompare(b.date)||norm(a.startHour)-norm(b.startHour));
    return (
      <div style={{padding:"10px 10px 80px"}}>
        {list.length===0
          ? <div style={{textAlign:"center",padding:"60px 0",color:"#9ca3af"}}><div style={{fontSize:44,marginBottom:10}}>🚗</div><div style={{fontSize:14}}>今後の予約はありません</div></div>
          : <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {list.map(r=><Card key={r.id} res={r} showDate/>)}
            </div>
        }
      </div>
    );
  };

  // ===== 予約モーダル =====
  const editUser = isEdit ? USERS.find(u=>u.id===reservations.find(r=>r.id===modal?.editId)?.userId) : user;

  const ReservationModal = () => (
    <div style={S.modal} onClick={()=>setModal(null)}>
      <div style={S.sheet} onClick={e=>e.stopPropagation()}>
        <div style={{width:34,height:4,background:"#e5e7eb",borderRadius:2,margin:"0 auto 18px"}}/>
        <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>{isEdit?"✏️ 予約を編集":"🚗 予約を追加"}</div>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:18}}>
          {(()=>{const {mo,da,dw}=fjp(modal.date);return`${mo}月${da}日（${dw}）`;})()}
          ・{editUser?.emoji} {editUser?.name}
        </div>

        <div style={{marginBottom:14}}>
          <label style={S.lbl}>開始時間</label>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <select value={mH(form.sM)} style={S.sel} onChange={e=>{const h=+e.target.value,s=toM(h,mM(form.sM));setForm({...form,sM:s,eM:s+60});setErr("");}}>
              {HOURS.map(h=><option key={h} value={h}>{h}</option>)}
            </select>
            <span style={{fontSize:13,whiteSpace:"nowrap"}}>時</span>
            <select value={mM(form.sM)} style={S.sel} onChange={e=>{const m=+e.target.value,s=toM(mH(form.sM),m);setForm({...form,sM:s,eM:s+60});setErr("");}}>
              {MINS.map(m=><option key={m} value={m}>{String(m).padStart(2,"0")}</option>)}
            </select>
            <span style={{fontSize:13,whiteSpace:"nowrap"}}>分</span>
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={S.lbl}>終了時間</label>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <select value={mH(form.eM)} style={S.sel} onChange={e=>{setForm({...form,eM:toM(+e.target.value,mM(form.eM))});setErr("");}}>
              {HOURS.map(h=><option key={h} value={h}>{h}</option>)}
            </select>
            <span style={{fontSize:13,whiteSpace:"nowrap"}}>時</span>
            <select value={mM(form.eM)} style={S.sel} onChange={e=>{setForm({...form,eM:toM(mH(form.eM),+e.target.value)});setErr("");}}>
              {MINS.map(m=><option key={m} value={m}>{String(m).padStart(2,"0")}</option>)}
            </select>
            <span style={{fontSize:13,whiteSpace:"nowrap"}}>分</span>
          </div>
        </div>

        <div style={{marginBottom:20}}>
          <label style={S.lbl}>目的</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {PURPOSES.map(p=>(
              <button key={p}
                onClick={()=>setForm({...form,note:p})}
                style={{padding:"7px 13px",borderRadius:18,border:`2px solid ${form.note===p?editUser?.color:"#e5e7eb"}`,background:form.note===p?`${editUser?.color}18`:"white",fontSize:13,fontWeight:form.note===p?700:400,color:form.note===p?editUser?.color:"#374151"}}>
                {p}
              </button>
            ))}
          </div>
        </div>

        {err&&(
          <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:9,padding:"9px 12px",marginBottom:12,display:"flex",gap:7,alignItems:"flex-start"}}>
            <span style={{fontSize:17}}>🚫</span>
            <span style={{fontSize:12,color:"#b91c1c",fontWeight:600}}>{err}</span>
          </div>
        )}

        <button onClick={save}
          style={{width:"100%",padding:"13px",borderRadius:11,border:"none",background:THEME,color:"white",fontSize:14,fontWeight:700}}>
          {saving?"保存中...":isEdit?"変更を保存":"予約する"}
        </button>
      </div>
    </div>
  );

  // ===== 削除確認 =====
  const delRes  = reservations.find(r=>r.id===delId);
  const delUser = USERS.find(u=>u.id===delRes?.userId);
  const DeleteModal = () => (
    <div style={S.overlay}>
      <div style={{background:"white",borderRadius:15,padding:"22px 18px",width:"100%",maxWidth:330}}>
        <div style={{fontSize:30,textAlign:"center",marginBottom:10}}>🗑️</div>
        <div style={{fontSize:14,fontWeight:700,textAlign:"center",marginBottom:7}}>予約を削除しますか？</div>
        {delRes&&(
          <div style={{background:"#f8f7f4",borderRadius:9,padding:"9px 12px",marginBottom:18,textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:700,color:delUser?.color}}>{delUser?.emoji} {delUser?.name}</div>
            <div style={{fontSize:12,color:"#374151"}}>{delRes.date}　{fmt(norm(delRes.startHour))}〜{fmt(norm(delRes.endHour))}</div>
            {delRes.note&&<div style={{fontSize:11,color:"#6b7280"}}>{delRes.note}</div>}
          </div>
        )}
        <div style={{display:"flex",gap:9}}>
          <button onClick={()=>setDelId(null)} style={{flex:1,padding:"11px",borderRadius:9,border:"1.5px solid #e5e7eb",background:"white",fontSize:13,fontWeight:600,color:"#374151"}}>キャンセル</button>
          <button onClick={doDel} style={{flex:1,padding:"11px",borderRadius:9,border:"none",background:"#ef4444",color:"white",fontSize:13,fontWeight:700}}>
            {saving?"削除中...":"削除する"}
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f0fdf4"}}>
      <Header/>
      <Tabs/>
      {view==="month" && <MonthView/>}
      {view==="week"  && <WeekView/>}
      {view==="list"  && <ListView/>}
      {modal  && <ReservationModal/>}
      {delId  && <DeleteModal/>}
    </div>
  );
}

document.getElementById("loading").style.display = "none";
document.getElementById("app").style.display = "block";
ReactDOM.render(<App/>, document.getElementById("app"));
</script>


</body></html>
